<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Física - Composição Corporal</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .screen-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 { color: #1e466e; border-left: 5px solid #2c7da0; padding-left: 15px; font-size: 1.6rem; }
        .sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        /* Layout do Formulário */
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .field { flex: 1; min-width: 150px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
        
        .medidas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .medida-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; }
        
        .dobras-section { background: #eef2f7; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .dobras-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* Botões */
        .btn-group { text-align: center; margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #calcularBtn { background: #2c7da0; color: white; }
        #imprimirBtn { background: #5f6c7a; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Área de Resultado */
        .result-area { background: #fffdf2; border: 2px solid #ffecb3; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .result-block { margin-bottom: 15px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        .result-title { font-weight: bold; color: #1e466e; font-size: 1.1rem; margin-bottom: 5px; }
        .value-highlight { font-size: 1.3rem; font-weight: bold; color: #d9534f; }

        .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #777; border-top: 1px solid #eee; padding-top: 15px; }

        /* REGRAS DE IMPRESSÃO (PDF) */
        @media print {
            body { background: white; padding: 0; }
            .screen-container { box-shadow: none; max-width: 100%; padding: 0; }
            .form-row, .medidas-grid, .dobras-section, .btn-group, .sub { display: none; }
            .result-area { border: 1px solid #000; background: white; }
            .value-highlight { color: black; }
            .footer { position: fixed; bottom: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="screen-container">
    <h1>Avaliação Física - Composição Corporal</h1>
    <div class="sub">Protocolo Jackson & Pollock (3 Dobras) | CREF 032841-G/PR</div>

    <div class="form-row">
        <div class="field" style="flex: 2;"><label>Nome do Avaliado</label><input type="text" id="nome" value="Raíssa Silva"></div>
        <div class="field"><label>Idade</label><input type="number" id="idade" value="32"></div>
        <div class="field">
            <label>Sexo</label>
            <select id="sexo">
                <option value="F" selected>Feminino</option>
                <option value="M">Masculino</option>
            </select>
        </div>
    </div>

    <div class="medidas-grid">
        <div class="medida-card"><label>Peso (kg)</label><input type="number" id="peso" step="0.1" value="57.2"></div>
        <div class="medida-card"><label>Estatura (m)</label><input type="number" id="estatura" step="0.01" value="1.57"></div>
        <div class="medida-card"><label>Cintura (cm)</label><input type="number" id="cintura" value="77.9"></div>
        <div class="medida-card"><label>Quadril (cm)</label><input type="number" id="quadril" value="95.6"></div>
    </div>

    <div class="dobras-section">
        <label>Dobras Cutâneas (mm) - Médias</label>
        <div class="dobras-grid">
            <div class="field"><label>Tríceps</label><input type="number" id="tri" value="26.2"></div>
            <div class="field"><label>Abdominal</label><input type="number" id="abd" value="22.0"></div>
            <div class="field"><label>Suprailíaca</label><input type="number" id="sup" value="21.3"></div>
        </div>
    </div>

    <div class="btn-group">
        <button id="calcularBtn" onclick="calcular()">📊 Calcular Agora</button>
        <button id="imprimirBtn" onclick="window.print()">📄 Gerar PDF / Imprimir</button>
    </div>

    <div id="resultado" class="result-area">
        <p style="text-align: center; color: #999;">Os resultados aparecerão aqui após o cálculo.</p>
    </div>

    <div class="footer">
        <strong>Prof. Dr. Murilo Luiz Burim</strong> - CREF 032841-G/PR<br>
        UEL • Universidade Anhanguera/UNOPAR - 2026
    </div>
</div>

<script>
    function calcular() {
        const nome = document.getElementById('nome').value;
        const idade = parseFloat(document.getElementById('idade').value);
        const sexo = document.getElementById('sexo').value;
        const peso = parseFloat(document.getElementById('peso').value);
        const estatura = parseFloat(document.getElementById('estatura').value);
        const cintura = parseFloat(document.getElementById('cintura').value);
        const quadril = parseFloat(document.getElementById('quadril').value);
        
        const tri = parseFloat(document.getElementById('tri').value);
        const abd = parseFloat(document.getElementById('abd').value);
        const sup = parseFloat(document.getElementById('sup').value);
        
        const soma = tri + abd + sup;
        const imc = peso / (estatura * estatura);
        
        let gc = 0;
        if (sexo === 'M') {
            gc = 0.39287 * soma - 0.00105 * Math.pow(soma, 2) + 0.15772 * idade - 5.18845;
        } else {
            gc = 0.41563 * soma - 0.00112 * Math.pow(soma, 2) + 0.03661 * idade + 4.03653;
        }

        const pesoGordura = peso * (gc / 100);
        const massaMagra = peso - pesoGordura;
        const rcq = cintura / quadril;

        document.getElementById('resultado').innerHTML = `
            <div class="result-block">
                <div class="result-title">📌 Relatório de: ${nome}</div>
                <p>IMC: <strong>${imc.toFixed(2)}</strong> | RCQ: <strong>${rcq.toFixed(2)}</strong></p>
            </div>
            <div class="result-block">
                <div class="result-title">⚡ Composição Corporal</div>
                <p>Percentual de Gordura: <span class="value-highlight">${gc.toFixed(1)}%</span></p>
                <p>Massa Gorda: ${pesoGordura.toFixed(1)} kg | Massa Magra: ${massaMagra.toFixed(1)} kg</p>
            </div>
            <p style="font-size: 0.7rem; color: #666;">*Protocolo Jackson & Pollock 3 Dobras. Data: ${new Date().toLocaleDateString()}</p>
        `;
    }
</script>

</body>
</html>
